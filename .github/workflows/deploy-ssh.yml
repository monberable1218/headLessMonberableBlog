name: Deploy Astro to Xserver

on:
  push:
    branches:
      - main # mainブランチにpushされたときに自動実行
  repository_dispatch:
    types:
      - microcms # microCMSにて、お知らせ・ブログのコンテンツを公開、更新した時に自動実行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 独自のソースコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js環境のセットアップ（Astroのビルドに必要）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # プロジェクトのNodeバージョンに合わせて変更してください
          cache: 'npm'       # npm, yarn, pnpm などに合わせてキャッシュ（高速化）

      # 3. 依存関係のインストールとAstroのビルド
      - name: Install dependencies and Build

        env:
          PUBLIC_MICROCMS_SERVICE_DOMAIN: ${{ secrets.PUBLIC_MICROCMS_SERVICE_DOMAIN }}
          PUBLIC_MICROCMS_API_KEY: ${{ secrets.PUBLIC_MICROCMS_API_KEY }}
        run: |
          npm ci            # もし pnpm なら pnpm install、yarn なら yarn install --immutable
          npm run build     # Astroのビルドを実行（デフォルトで dist/ フォルダが生成されます）

      # 4. ビルドされた「distフォルダ」の中身だけをSFTPでXserverへ同期
      - name: Deploy to Xserver via SFTP
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          REMOTE_HOST: ${{ secrets.SSH_HOSTNAME }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          # ★ローカルの「dist/」フォルダの中身だけを対象にする
          SOURCE: "dist/"
          # Xserver上のアップロード先（ドメイン名はご自身のものに変更してください）
          TARGET: /home/${{ secrets.SSH_USERNAME }}/monberable.com/public_html/
          ARGS: "-rlgoDzvc -i --delete"
